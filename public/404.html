<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>EcoSystem</title>
    <script>
      // GitHub Pages SPA redirect
      // Rewrites /repo/some/path?x=1 -> /repo/?/some/path&x=1
      // so index.html can restore the URL client-side.
      (function () {
        var segmentCount = 1; // number of path segments to keep as the base (repo name)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
